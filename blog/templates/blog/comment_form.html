{% extends 'base.html' %}

{% block title %}Edit Comment — Portfolio Builder{% endblock %}

{% block content %}
<div class="card p-4 mx-auto" style="max-width: 600px;">
    <h2>Edit Comment</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.message.label_tag }}
            {{ form.message }}
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'blog_detail' slug=comment.post.slug %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
