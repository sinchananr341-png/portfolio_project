{% extends 'base.html' %}

{% block title %}Delete Blog Post — Portfolio Builder{% endblock %}

{% block content %}
<div class="confirm-delete fade-in">
    <div class="card" style="padding: 2.5rem;">
        <h2>⚠️ Delete Blog Post</h2>
        <p>Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content: center;">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'blog_detail' slug=post.slug %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
