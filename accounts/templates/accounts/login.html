{% extends 'base.html' %}

{% block title %}Login — Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-container fade-in">
    <div class="card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your portfolio</p>

        <form method="post" class="form-container">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" placeholder="Username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p class="alt-link">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
    </div>
</div>
{% endblock %}
