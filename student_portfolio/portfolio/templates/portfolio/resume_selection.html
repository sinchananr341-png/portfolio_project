{% extends 'base.html' %}

{% block title %}Select a Resume Template — Portfolio Builder{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="page-header text-center">
        <h1>Select a Resume Template</h1>
        <p>Choose the perfect design for your career profile</p>
    </div>

    <div class="grid-2 mt-4" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
        {% for template in templates %}
        <div class="card p-3 text-center" style="display: flex; flex-direction: column; align-items: center; justify-content: space-between;">
            <div style="width: 100%; height: 150px; background-color: var(--surface-2); border-radius: 8px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 2rem; color: var(--text-muted); opacity: 0.5;">📄</span>
            </div>
            <h3 style="text-transform: capitalize;">{{ template }}</h3>
            <div class="mt-3 w-100" style="display: flex; gap: 10px;">
                <a href="{% url 'resume_preview' template_name=template %}" class="btn btn-secondary flex-1" target="_blank">Preview</a>
                <a href="{% url 'resume_download' template_name=template %}" class="btn btn-primary flex-1">Download</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
