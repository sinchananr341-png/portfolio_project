{% extends 'base.html' %}

{% block title %}Delete Comment — Portfolio Builder{% endblock %}

{% block content %}
<div class="card p-4 mx-auto text-center" style="max-width: 500px;">
    <h2>Delete Comment</h2>
    <p>Are you sure you want to delete this comment?</p>
    <div class="alert alert-warning">
        "{{ comment.message|truncatechars:100 }}"
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-2 mt-3">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'blog_detail' slug=comment.post.slug %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
